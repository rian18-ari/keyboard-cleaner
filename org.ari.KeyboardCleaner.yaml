app-id: org.ari.KeyboardCleaner
runtime: org.gnome.Platform
runtime-version: '50'
sdk: org.gnome.Sdk
command: app.py
finish-args:
  - --socket=fallback-x11
  - --share=ipc
  - --socket=wayland
  - --socket=pulseaudio # <--- Ini kunci penyelamat untuk mengatasi error audio tadi
  - --device=dri
modules:
  - name: python3-pygame
    buildsystem: simple
    # SAKLAR INTERNET: Memberi izin akses jaringan khusus saat modul ini dibangun
    build-options:
      build-args:
        - --share=network
    build-commands:
      - pip3 install --prefix=/app pygame
  
  - name: keyboard-cleaner
    buildsystem: simple
    build-commands:
      # 1. Install skrip utama Python
      - install -D app.py /app/bin/app.py
      
      # 2. Install shortcut desktop agar muncul di menu launcher Fedora
      - install -D org.ari.KeyboardCleaner.desktop /app/share/applications/org.ari.KeyboardCleaner.desktop
      
      # 3. Install metadata AppStream agar terbaca oleh GNOME Software Store
      - install -D org.ari.KeyboardCleaner.metainfo.xml /app/share/metainfo/org.ari.KeyboardCleaner.metainfo.xml
      
      # 4. Install aset ikon ke folder standar sistem Flatpak
      - install -D org.ari.KeyboardCleaner.png /app/share/icons/hicolor/512x512/apps/org.ari.KeyboardCleaner.png
      
    sources:
      # Bagian ini memberi tahu Flatpak file apa saja yang harus diambil dari folder proyekmu
      - type: file
        path: app.py
      - type: file
        path: org.ari.KeyboardCleaner.desktop
      - type: file
        path: org.ari.KeyboardCleaner.metainfo.xml
      - type: file
        path: org.ari.KeyboardCleaner.png